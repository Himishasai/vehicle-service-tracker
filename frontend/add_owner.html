<!DOCTYPE html>
<html>
<head>
    <title>Add Owner</title>

    <style>
        body { font-family: Arial; background: #f4f6f9; }
        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: #1abc9c;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Add Owner</h2>

    <input id="name" placeholder="Name"><br>
    <input id="phone" placeholder="Phone"><br>
    <input id="address" placeholder="Address"><br>

    <button onclick="addOwner()">Add Owner</button><br><br>

    <a href="/ui">⬅ Back</a>
</div>

<script>
function addOwner() {
    fetch("/add_owner", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value
        })
    })
    .then(res => res.json())
    .then(() => alert("Owner Added ✅"))
    .catch(() => alert("Error ❌"));
}
</script>

</body>
</html>
