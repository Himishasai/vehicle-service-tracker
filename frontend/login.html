<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#1e3c72,#2a5298);
font-family:Arial;
}

.box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px;
background:#1e3c72;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
</div>

<script>

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

// simple login
if(u==="admin" && p==="1234"){
localStorage.setItem("loggedIn","true");
window.location.href="/ui";
}else{
alert("Invalid Login");
}
}

</script>

</body>
</html>
