<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Service History</h2>
    <ul id="list"></ul>
</div>

<script>
fetch("/service_history")
.then(res => res.json())
.then(data => {
    let list = document.getElementById("list");
    data.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item.vehicle_number + " - " + item.description;
        list.appendChild(li);
    });
});
</script>

</body>
</html>
