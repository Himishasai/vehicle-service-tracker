<!DOCTYPE html>
<html>
<head>
    <title>Service History</title>
    <link rel="stylesheet" href="style.css">

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background: #3498db;
            color: white;
        }
        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Service History</h2>

    <input id="search" placeholder="Search Vehicle..." onkeyup="searchVehicle()">

    <table>
        <thead>
            <tr>
                <th>Vehicle</th>
                <th>Date</th>
                <th>Description</th>
                <th>Cost</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

<script>
// Load data
function loadHistory() {
    fetch("/service_history")
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("historyTable");
        table.innerHTML = "";

        data.forEach(item => {
            let row = `
                <tr>
                    <td>${item.vehicle_number}</td>
                    <td>${item.service_date}</td>
                    <td>${item.description}</td>
                    <td>₹${item.cost}</td>
                </tr>
            `;
            table.innerHTML += row;
        });
    });
}

// Search
function searchVehicle() {
    let input = document.getElementById("search").value;

    fetch(`/search_vehicle/${input}`)
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("historyTable");
        table.innerHTML = "";

        data.forEach(item => {
            let row = `
                <tr>
                    <td>${item.vehicle_number}</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                </tr>
            `;
            table.innerHTML += row;
        });
    });
}

// Load on start
loadHistory();
</script>

</body>
</html>
