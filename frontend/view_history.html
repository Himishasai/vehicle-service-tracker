<button onclick="load()">Load</button>
<table border="1">
<thead><tr>
<th>Vehicle</th><th>Date</th><th>Desc</th><th>Cost</th><th>Mech</th>
</tr></thead>
<tbody id="t"></tbody>
</table>

<script>
async function load(){
let r=await fetch("http://127.0.0.1:5000/service_history");
let d=await r.json();
t.innerHTML="";
d.forEach(x=>{
t.innerHTML+=`<tr>
<td>${x.vehicle_number}</td>
<td>${x.service_date}</td>
<td>${x.description}</td>
<td>${x.cost}</td>
<td>${x.mechanic}</td>
</tr>`;
});
}
</script>
