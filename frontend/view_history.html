<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<h2>Service History</h2>

<table>
<thead>
<tr>
<th>ID</th><th>Vehicle</th><th>Date</th><th>Description</th><th>Cost</th><th>Action</th>
</tr>
</thead>

<tbody id="t"></tbody>
</table>
</div>

<script>
function load(){
fetch("/service_history")
.then(r=>r.json())
.then(d=>{
t.innerHTML="";
d.forEach(x=>{
t.innerHTML+=`
<tr>
<td>${x.service_id}</td>
<td>${x.vehicle_number}</td>
<td>${x.service_date}</td>
<td>${x.description}</td>
<td>${x.cost}</td>
<td>
<button style="background:#ff4d4d" onclick="del(${x.service_id})">Delete</button>
<button style="background:#4dff88" onclick="edit(${x.service_id})">Edit</button>
</td>
</tr>`;
});
});
}

function del(id){
fetch("/delete_service/"+id,{method:"DELETE"})
.then(()=>{alert("Deleted");load();});
}

function edit(id){
let d=prompt("New description");
let c=prompt("New cost");
fetch("/update_service/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({description:d,cost:c})
}).then(()=>{alert("Updated");load();});
}

load();
</script>

</body>
</html>
