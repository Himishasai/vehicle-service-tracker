<!DOCTYPE html>
<html lang="en">
<head>
    <title>Service History</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    🚗 Service Tracker
    <div>
        <a href="index.html">Dashboard</a>
        <a href="add_owner.html">Owner</a>
        <a href="add_vehicle.html">Vehicle</a>
        <a href="add_service.html">Service</a>
        <a href="view_history.html">History</a>
    </div>
</div>

<div class="container">
    <h1>Service History</h1>

    <table>
        <thead>
            <tr>
                <th>Vehicle</th>
                <th>Date</th>
                <th>Description</th>
                <th>Cost</th>
                <th>Mechanic</th>
            </tr>
        </thead>

        <tbody id="historyTable"></tbody>
    </table>
</div>

<script>
fetch("/service_history")
.then(res => res.json())
.then(data => {

    let table = document.getElementById("historyTable");
    table.innerHTML = "";

    data.forEach(row => {
        table.innerHTML += `
            <tr>
                <td>${row.vehicle_number}</td>
                <td>${row.service_date}</td>
                <td>${row.description}</td>
                <td>₹${row.cost}</td>
                <td>${row.mechanic}</td>
            </tr>
        `;
    });

})
.catch(() => alert("Error loading history"));
</script>

</body>
</html>
