<!DOCTYPE html>
<html>
<head>
    <title>Add Vehicle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Add Vehicle</h2>

    <input id="owner_id" placeholder="Owner ID"><br><br>
    <input id="number" placeholder="Vehicle Number"><br><br>
    <input id="model" placeholder="Model"><br><br>
    <input id="type" placeholder="Type"><br><br>

    <button onclick="addVehicle()">Add Vehicle</button>
</div>

<script>
async function addVehicle() {
    await fetch("/add_vehicle", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            owner_id: document.getElementById("owner_id").value,
            vehicle_number: document.getElementById("number").value,
            model: document.getElementById("model").value,
            type: document.getElementById("type").value
        })
    });

    alert("Vehicle Added ✅");
}
</script>

</body>
</html>
