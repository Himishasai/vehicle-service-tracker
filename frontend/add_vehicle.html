<!DOCTYPE html>
<html>
<head>
    <title>Add Vehicle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Add Vehicle</h2>

    <input type="number" id="owner_id" placeholder="Owner ID">
    <input type="text" id="vehicle_number" placeholder="Vehicle Number">
    <input type="text" id="model" placeholder="Model">

    <button onclick="addVehicle()">Add Vehicle</button>
</div>

<script>
function addVehicle() {
    fetch("/add_vehicle", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            owner_id: document.getElementById("owner_id").value,
            vehicle_number: document.getElementById("vehicle_number").value,
            model: document.getElementById("model").value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message))
    .catch(() => alert("Error ❌"));
}
</script>

</body>
</html>
