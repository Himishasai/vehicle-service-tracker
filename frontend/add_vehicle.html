<!DOCTYPE html>
<html>
<head>
    <title>Add Vehicle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Add Vehicle</h2>

    <input id="owner_id" placeholder="Owner ID">
    <input id="vehicle_number" placeholder="Vehicle Number">
    <input id="model" placeholder="Model">
    <input id="type" placeholder="Type">

    <button onclick="addVehicle()">Submit</button>
</div>

<script>
function addVehicle() {
    fetch("/add_vehicle", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            owner_id: owner_id.value,
            vehicle_number: vehicle_number.value,
            model: model.value,
            type: type.value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>

</body>
</html>
