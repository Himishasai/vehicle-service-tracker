<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .navbar h2 {
            margin: 0;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-links a:hover {
            color: #1abc9c;
        }

        .container {
            padding: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card h1 {
            color: #1abc9c;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #3498db;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🚗 Vehicle Service System</h2>

    <div class="nav-links">
        <a href="add_owner.html">Add Owner</a>
        <a href="add_vehicle.html">Add Vehicle</a>
        <a href="add_service.html">Add Service</a>
        <a href="view_history.html">History</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<!-- DASHBOARD -->
<div class="container">
    <h1>Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Owners</h3>
            <h1 id="owners">0</h1>
        </div>

        <div class="card">
            <h3>Total Vehicles</h3>
            <h1 id="vehicles">0</h1>
        </div>

        <div class="card">
            <h3>Total Services</h3>
            <h1 id="services">0</h1>
        </div>

    </div>
</div>

<script>
const BASE_URL = "http://127.0.0.1:5000"; // 🔁 change when deployed

function loadStats() {
    fetch(BASE_URL + "/stats")
    .then(res => res.json())
    .then(data => {
        document.getElementById("owners").innerText = data.owners;
        document.getElementById("vehicles").innerText = data.vehicles;
        document.getElementById("services").innerText = data.services;
    })
    .catch(() => {
        alert("Backend not running!");
    });
}

loadStats();
</script>

</body>
</html>
