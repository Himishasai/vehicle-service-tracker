<script>
const BASE_URL = "https://vehicle-service-tracker.onrender.com";

// Check backend
fetch(BASE_URL + "/")
.then(res => res.text())
.then(data => console.log("Backend OK"))
.catch(() => alert("Backend not running!"));

// Load dashboard data
function loadDashboard() {
    fetch(BASE_URL + "/service_history")
    .then(res => res.json())
    .then(data => {
        document.getElementById("services").innerText = data.length;
    });

    fetch(BASE_URL + "/owners")
    .then(res => res.json())
    .then(data => {
        document.getElementById("owners").innerText = data.length;
    });

    fetch(BASE_URL + "/vehicles")
    .then(res => res.json())
    .then(data => {
        document.getElementById("vehicles").innerText = data.length;
    });
}

loadDashboard();
</script>
