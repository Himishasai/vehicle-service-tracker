<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    🚗 Vehicle Service System
    <div>
        <a href="add_owner.html">Add Owner</a>
        <a href="add_vehicle.html">Add Vehicle</a>
        <a href="add_service.html">Add Service</a>
        <a href="view_history.html">History</a>
    </div>
</div>

<div class="container">
    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">Owners: <span id="owners">0</span></div>
        <div class="card">Vehicles: <span id="vehicles">0</span></div>
        <div class="card">Services: <span id="services">0</span></div>
    </div>
</div>

<script>
fetch("/dashboard")
.then(res => res.json())
.then(data => {
    document.getElementById("owners").innerText = data.owners;
    document.getElementById("vehicles").innerText = data.vehicles;
    document.getElementById("services").innerText = data.services;
});
</script>

</body>
</html>
