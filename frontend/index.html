<!DOCTYPE html>
<html>
<head>
<title>Vehicle Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {margin:0;font-family:Arial;background:linear-gradient(to right,#1e3c72,#2a5298);color:white;}
.navbar {background:#0d1b2a;padding:15px;display:flex;gap:20px;}
.navbar button {background:none;border:none;color:white;cursor:pointer;font-size:16px;}
.section {display:none;padding:20px;}
.dashboard {display:flex;gap:20px;}
.card {flex:1;background:#1d3557;padding:20px;border-radius:10px;text-align:center;}
input,select {padding:10px;margin:5px;}
button {padding:10px;background:#457b9d;color:white;border:none;cursor:pointer;margin:2px;}
table {width:100%;background:white;color:black;margin-top:20px;}
</style>
</head>

<body>

<div class="navbar">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('owner')">Owner</button>
<button onclick="showSection('vehicle')">Vehicle</button>
<button onclick="showSection('service')">Service</button>
<button onclick="showSection('history')">History</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Dashboard</h2>
<div class="dashboard">
<div class="card">Owners: <span id="ownersCount">0</span></div>
<div class="card">Vehicles: <span id="vehiclesCount">0</span></div>
<div class="card">Services: <span id="servicesCount">0</span></div>
</div>
<canvas id="chart"></canvas>
</div>

<!-- OWNER -->
<div id="owner" class="section">
<h2>Owner Management</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button onclick="addOwner()">Add Owner</button>

<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Phone</th><th>Address</th><th>Action</th></tr>
</thead>
<tbody id="ownerTable"></tbody>
</table>
</div>

<!-- VEHICLE -->
<div id="vehicle" class="section">
<h2>Vehicle Management</h2>

<select id="ownerDropdown"></select>
<input id="vehicle_number" placeholder="Vehicle Number">
<input id="model" placeholder="Model">
<input id="type" placeholder="Type">

<button onclick="addVehicle()">Add Vehicle</button>

<table>
<thead>
<tr><th>ID</th><th>Owner</th><th>Number</th><th>Model</th><th>Type</th><th>Action</th></tr>
</thead>
<tbody id="vehicleTable"></tbody>
</table>
</div>

<!-- SERVICE -->
<div id="service" class="section">
<h2>Service Management</h2>

<select id="vehicleDropdown"></select>
<input id="date" placeholder="Date">
<input id="desc" placeholder="Description">
<input id="cost" placeholder="Cost">

<button onclick="addService()">Add Service</button>

<table>
<thead>
<tr><th>ID</th><th>Vehicle</th><th>Date</th><th>Description</th><th>Cost</th><th>Action</th></tr>
</thead>
<tbody id="serviceTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Service History</h2>
<table>
<thead>
<tr><th>ID</th><th>Vehicle</th><th>Date</th><th>Description</th><th>Cost</th></tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
</div>

<script>

// NAV
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// -------- OWNER --------
function addOwner(){
fetch("/add_owner",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name.value,phone:phone.value,address:address.value})})
.then(()=>{loadOwners();loadDashboard();});
}

function loadOwners(){
fetch("/get_owners")
.then(res=>res.json())
.then(data=>{
let rows="",dd="";
data.forEach(o=>{
rows+=`
<tr>
<td>${o.owner_id}</td>

<td id="on-${o.owner_id}">${o.name}</td>
<td id="op-${o.owner_id}">${o.phone}</td>
<td id="oa-${o.owner_id}">${o.address}</td>

<td>
<button onclick="enableOwner(${o.owner_id})">Edit</button>
<button onclick="saveOwner(${o.owner_id})">Save</button>
<button onclick="deleteOwner(${o.owner_id})">Delete</button>
</td>
</tr>`;
dd+=`<option value="${o.owner_id}">${o.name}</option>`;
});
ownerTable.innerHTML=rows;
ownerDropdown.innerHTML=dd;
});
}

function enableOwner(id){
["on","op","oa"].forEach(f=>{
let el=document.getElementById(f+"-"+id);
el.contentEditable=true;
el.style.background="#fff3cd";
});
}

function saveOwner(id){
fetch("/update_owner/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("on-"+id).innerText,
phone:document.getElementById("op-"+id).innerText,
address:document.getElementById("oa-"+id).innerText
})
})
.then(()=>loadOwners());
}

function deleteOwner(id){
fetch("/delete_owner/"+id,{method:"DELETE"})
.then(()=>{loadOwners();loadDashboard();});
}

// -------- VEHICLE --------
function addVehicle(){
fetch("/add_vehicle",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({
owner_id:ownerDropdown.value,
vehicle_number:vehicle_number.value,
model:model.value,
type:type.value
})})
.then(()=>{loadVehicles();loadDashboard();});
}

function loadVehicles(){
fetch("/get_vehicles")
.then(res=>res.json())
.then(data=>{
let rows="",dd="";
data.forEach(v=>{
rows+=`
<tr>
<td>${v.vehicle_id}</td>

<td id="vo-${v.vehicle_id}">${v.owner_id}</td>
<td id="vn-${v.vehicle_id}">${v.vehicle_number}</td>
<td id="vm-${v.vehicle_id}">${v.model}</td>
<td id="vt-${v.vehicle_id}">${v.type}</td>

<td>
<button onclick="enableVehicle(${v.vehicle_id})">Edit</button>
<button onclick="saveVehicle(${v.vehicle_id})">Save</button>
<button onclick="deleteVehicle(${v.vehicle_id})">Delete</button>
</td>
</tr>`;
dd+=`<option value="${v.vehicle_id}">${v.vehicle_number}</option>`;
});
vehicleTable.innerHTML=rows;
vehicleDropdown.innerHTML=dd;
});
}

function enableVehicle(id){
["vo","vn","vm","vt"].forEach(f=>{
let el=document.getElementById(f+"-"+id);
el.contentEditable=true;
el.style.background="#fff3cd";
});
}

function saveVehicle(id){
fetch("/update_vehicle/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
owner_id:document.getElementById("vo-"+id).innerText,
vehicle_number:document.getElementById("vn-"+id).innerText,
model:document.getElementById("vm-"+id).innerText,
type:document.getElementById("vt-"+id).innerText
})
})
.then(()=>loadVehicles());
}

function deleteVehicle(id){
fetch("/delete_vehicle/"+id,{method:"DELETE"})
.then(()=>{loadVehicles();loadDashboard();});
}

// -------- SERVICE --------
function addService(){
fetch("/add_service",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({
vehicle_id:vehicleDropdown.value,
service_date:date.value,
description:desc.value,
cost:cost.value
})})
.then(()=>{loadServices();loadDashboard();loadHistory();});
}

function loadServices(){
fetch("/get_services")
.then(res=>res.json())
.then(data=>{
let rows="";
data.forEach(s=>{
rows+=`
<tr>
<td>${s.service_id}</td>

<td id="sv-${s.service_id}">${s.vehicle_id}</td>
<td id="sd-${s.service_id}">${s.service_date}</td>
<td id="ss-${s.service_id}">${s.description}</td>
<td id="sc-${s.service_id}">${s.cost}</td>

<td>
<button onclick="enableService(${s.service_id})">Edit</button>
<button onclick="saveService(${s.service_id})">Save</button>
<button onclick="deleteService(${s.service_id})">Delete</button>
</td>
</tr>`;
});
serviceTable.innerHTML=rows;
});
}

function enableService(id){
["sv","sd","ss","sc"].forEach(f=>{
let el=document.getElementById(f+"-"+id);
el.contentEditable=true;
el.style.background="#fff3cd";
});
}

function saveService(id){
fetch("/update_service/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
vehicle_id:document.getElementById("sv-"+id).innerText,
service_date:document.getElementById("sd-"+id).innerText,
description:document.getElementById("ss-"+id).innerText,
cost:document.getElementById("sc-"+id).innerText
})
})
.then(()=>loadServices());
}

function deleteService(id){
fetch("/delete_service/"+id,{method:"DELETE"})
.then(()=>{loadServices();loadDashboard();});
}

// -------- HISTORY --------
function loadHistory(){
fetch("/history")
.then(res=>res.json())
.then(data=>{
let rows="";
data.forEach(h=>{
rows+=`<tr>
<td>${h.service_id}</td>
<td>${h.vehicle_number}</td>
<td>${h.service_date}</td>
<td>${h.description}</td>
<td>${h.cost}</td>
</tr>`;
});
historyTable.innerHTML=rows;
});
}

// -------- DASHBOARD --------
let chart;
function loadDashboard(){
fetch("/dashboard")
.then(res=>res.json())
.then(d=>{
ownersCount.innerText=d.owners;
vehiclesCount.innerText=d.vehicles;
servicesCount.innerText=d.services;

if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Owners","Vehicles","Services"],
datasets:[{data:[d.owners,d.vehicles,d.services]}]}
});
});
}

// INIT
showSection("dashboard");
loadOwners();
loadVehicles();
loadServices();
loadHistory();
loadDashboard();

</script>

</body>
</html>
