<!DOCTYPE html>
<html>
<head>
<title>Vehicle Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
margin:0;
font-family:Arial;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
}

.navbar {
background:rgba(0,0,0,0.5);
padding:15px;
display:flex;
gap:20px;
backdrop-filter:blur(10px);
}

.navbar button {
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.section {display:none;padding:20px;}

.dashboard {display:flex;gap:20px;}

.card {
flex:1;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(10px);
}

input,select {
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button {
padding:8px 12px;
background:#00b4d8;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover {background:#0077b6;}

table {
width:100%;
background:white;
color:black;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

th {background:#0077b6;color:white;padding:10px;}
td {padding:8px;text-align:center;}

.search {
padding:10px;
width:300px;
border-radius:8px;
border:none;
}

/* MODAL */
.modal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-box {
background:white;
color:black;
padding:20px;
border-radius:10px;
width:300px;
}
</style>
</head>

<body>

<div class="navbar">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('owner')">Owner</button>
<button onclick="showSection('vehicle')">Vehicle</button>
<button onclick="showSection('service')">Service</button>
<button onclick="showSection('history')">History</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Dashboard</h2>
<div class="dashboard">
<div class="card">Owners: <span id="ownersCount">0</span></div>
<div class="card">Vehicles: <span id="vehiclesCount">0</span></div>
<div class="card">Services: <span id="servicesCount">0</span></div>
</div>
<canvas id="chart"></canvas>
</div>

<!-- OWNER -->
<div id="owner" class="section">
<h2>Owner</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button onclick="addOwner()">Add</button>

<br><input class="search" placeholder="Search Owner..." onkeyup="searchOwner(this.value)">

<table>
<thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Address</th><th>Action</th></tr></thead>
<tbody id="ownerTable"></tbody>
</table>
</div>

<!-- VEHICLE -->
<div id="vehicle" class="section">
<h2>Vehicle</h2>

<select id="ownerDropdown"></select>
<input id="vehicle_number" placeholder="Number">
<input id="model" placeholder="Model">
<input id="type" placeholder="Type">
<button onclick="addVehicle()">Add</button>

<br><input class="search" placeholder="Search Vehicle..." onkeyup="searchVehicle(this.value)">

<table>
<thead><tr><th>ID</th><th>Owner</th><th>Number</th><th>Model</th><th>Type</th><th>Action</th></tr></thead>
<tbody id="vehicleTable"></tbody>
</table>
</div>

<!-- SERVICE -->
<div id="service" class="section">
<h2>Service</h2>

<select id="vehicleDropdown"></select>
<input id="date" placeholder="Date">
<input id="desc" placeholder="Description">
<input id="cost" placeholder="Cost">
<button onclick="addService()">Add</button>

<br><input class="search" placeholder="Search Service..." onkeyup="searchService(this.value)">

<table>
<thead><tr><th>ID</th><th>Vehicle</th><th>Date</th><th>Description</th><th>Cost</th><th>Action</th></tr></thead>
<tbody id="serviceTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>History</h2>
<table>
<thead><tr><th>ID</th><th>Vehicle</th><th>Date</th><th>Description</th><th>Cost</th></tr></thead>
<tbody id="historyTable"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Edit</h3>
<input id="m1"><input id="m2"><input id="m3"><input id="m4">
<button onclick="saveEdit()">Save</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let editType="",editId="";

// NAV
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// -------- OWNER --------
function addOwner(){
let nameVal = document.getElementById("name").value;
let phoneVal = document.getElementById("phone").value;
let addressVal = document.getElementById("address").value;

if(!nameVal || !phoneVal || !addressVal){
alert("Fill all fields");
return;
}

fetch("/add_owner",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:nameVal,phone:phoneVal,address:addressVal})})
.then(()=>{
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";
loadOwners();
loadDashboard();
});
}

function loadOwners(){
fetch("/get_owners").then(r=>r.json()).then(data=>{
let rows="",dd="";
data.forEach(o=>{
rows+=`<tr>
<td>${o.owner_id}</td>
<td>${o.name}</td>
<td>${o.phone}</td>
<td>${o.address}</td>
<td>
<button onclick="openEdit('owner',${o.owner_id},'${o.name}','${o.phone}','${o.address}')">Edit</button>
<button onclick="deleteOwner(${o.owner_id})">Delete</button>
</td></tr>`;
dd+=`<option value="${o.owner_id}">${o.name}</option>`;
});
ownerTable.innerHTML=rows;
ownerDropdown.innerHTML=dd;
});
}

function deleteOwner(id){
fetch("/delete_owner/"+id,{method:"DELETE"})
.then(()=>{loadOwners();loadDashboard();});
}

// -------- VEHICLE --------
function addVehicle(){
let owner_id=document.getElementById("ownerDropdown").value;
let vehicle_numberVal=document.getElementById("vehicle_number").value;
let modelVal=document.getElementById("model").value;
let typeVal=document.getElementById("type").value;

if(!owner_id||!vehicle_numberVal||!modelVal||!typeVal){
alert("Fill all fields");
return;
}

fetch("/add_vehicle",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({owner_id,vehicle_number:vehicle_numberVal,model:modelVal,type:typeVal})})
.then(()=>{
loadVehicles();
loadDashboard();
});
}

function loadVehicles(){
fetch("/get_vehicles").then(r=>r.json()).then(data=>{
let rows="",dd="";
data.forEach(v=>{
rows+=`<tr>
<td>${v.vehicle_id}</td>
<td>${v.owner_id}</td>
<td>${v.vehicle_number}</td>
<td>${v.model}</td>
<td>${v.type}</td>
<td>
<button onclick="openEdit('vehicle',${v.vehicle_id},${v.owner_id},'${v.vehicle_number}','${v.model}','${v.type}')">Edit</button>
<button onclick="deleteVehicle(${v.vehicle_id})">Delete</button>
</td></tr>`;
dd+=`<option value="${v.vehicle_id}">${v.vehicle_number}</option>`;
});
vehicleTable.innerHTML=rows;
vehicleDropdown.innerHTML=dd;
});
}

function deleteVehicle(id){
fetch("/delete_vehicle/"+id,{method:"DELETE"})
.then(()=>{loadVehicles();loadDashboard();});
}

// -------- SERVICE --------
function addService(){
let vehicle_id=document.getElementById("vehicleDropdown").value;
let service_dateVal=document.getElementById("date").value;
let descriptionVal=document.getElementById("desc").value;
let costVal=document.getElementById("cost").value;

if(!vehicle_id||!service_dateVal||!descriptionVal||!costVal){
alert("Fill all fields");
return;
}

fetch("/add_service",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({vehicle_id,service_date:service_dateVal,description:descriptionVal,cost:costVal})})
.then(()=>{
loadServices();
loadHistory();
loadDashboard();
});
}

function loadServices(){
fetch("/get_services").then(r=>r.json()).then(data=>{
let rows="";
data.forEach(s=>{
rows+=`<tr>
<td>${s.service_id}</td>
<td>${s.vehicle_id}</td>
<td>${s.service_date}</td>
<td>${s.description}</td>
<td>${s.cost}</td>
<td>
<button onclick="openEdit('service',${s.service_id},${s.vehicle_id},'${s.service_date}','${s.description}','${s.cost}')">Edit</button>
<button onclick="deleteService(${s.service_id})">Delete</button>
</td></tr>`;
});
serviceTable.innerHTML=rows;
});
}

function deleteService(id){
fetch("/delete_service/"+id,{method:"DELETE"})
.then(()=>{loadServices();loadHistory();loadDashboard();});
}

// -------- HISTORY --------
function loadHistory(){
fetch("/history")
.then(res=>res.json())
.then(data=>{
let rows="";
data.forEach(h=>{
rows+=`<tr>
<td>${h.service_id}</td>
<td>${h.vehicle_number}</td>
<td>${h.service_date}</td>
<td>${h.description}</td>
<td>${h.cost}</td>
</tr>`;
});
historyTable.innerHTML=rows;
});
}

// -------- DASHBOARD --------
let chart;
function loadDashboard(){
fetch("/dashboard")
.then(res=>res.json())
.then(d=>{
ownersCount.innerText=d.owners;
vehiclesCount.innerText=d.vehicles;
servicesCount.innerText=d.services;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Owners","Vehicles","Services"],
datasets:[{data:[d.owners,d.vehicles,d.services]}]
}
});
});
}

// SEARCH
function searchOwner(val){
document.querySelectorAll("#ownerTable tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val.toLowerCase())?"":"none";
});
}

function searchVehicle(val){
document.querySelectorAll("#vehicleTable tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val.toLowerCase())?"":"none";
});
}

function searchService(val){
document.querySelectorAll("#serviceTable tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val.toLowerCase())?"":"none";
});
}

// MODAL EDIT
function openEdit(type,id,a,b,c,d){
editType=type;editId=id;
modal.style.display="flex";
m1.value=a;m2.value=b;m3.value=c;m4.value=d;
}

function closeModal(){modal.style.display="none";}

function saveEdit(){
let url="",body={};

if(editType=="owner"){
url="/update_owner/"+editId;
body={name:m1.value,phone:m2.value,address:m3.value};
}
if(editType=="vehicle"){
url="/update_vehicle/"+editId;
body={owner_id:m1.value,vehicle_number:m2.value,model:m3.value,type:m4.value};
}
if(editType=="service"){
url="/update_service/"+editId;
body={vehicle_id:m1.value,service_date:m2.value,description:m3.value,cost:m4.value};
}

fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
.then(()=>{
closeModal();
loadOwners();
loadVehicles();
loadServices();
loadHistory();
loadDashboard();
});
}

// INIT
showSection("dashboard");
loadOwners();
loadVehicles();
loadServices();
loadHistory();
loadDashboard();

</script>

</body>
</html>
