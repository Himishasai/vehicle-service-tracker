<!DOCTYPE html>
<html>
<head>
<title>Vehicle Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {margin:0;font-family:Arial;background:linear-gradient(to right,#1e3c72,#2a5298);color:white;}
.navbar {background:#0d1b2a;padding:15px;display:flex;gap:20px;}
.navbar button {background:none;border:none;color:white;cursor:pointer;font-size:16px;}
.section {display:none;padding:20px;}
.dashboard {display:flex;gap:20px;}
.card {flex:1;background:#1d3557;padding:20px;border-radius:10px;text-align:center;}
input,select {padding:10px;margin:5px;}
button {padding:10px;background:#457b9d;color:white;border:none;cursor:pointer;margin:2px;}
table {width:100%;background:white;color:black;margin-top:20px;}
td[contenteditable="true"] {background:#fff3cd;}
</style>
</head>

<body>

<div class="navbar">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('owner')">Owner</button>
<button onclick="showSection('vehicle')">Vehicle</button>
<button onclick="showSection('service')">Service</button>
<button onclick="showSection('history')">History</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Dashboard</h2>
<div class="dashboard">
<div class="card">Owners: <span id="ownersCount">0</span></div>
<div class="card">Vehicles: <span id="vehiclesCount">0</span></div>
<div class="card">Services: <span id="servicesCount">0</span></div>
</div>
<canvas id="chart"></canvas>
</div>

<!-- OWNER -->
<div id="owner" class="section">
<h2>Owner Management</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button onclick="addOwner()">Add Owner</button>

<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Phone</th><th>Address</th><th>Action</th></tr>
</thead>
<tbody id="ownerTable"></tbody>
</table>
</div>

<!-- VEHICLE -->
<div id="vehicle" class="section">
<h2>Add Vehicle</h2>

<select id="ownerDropdown"></select>
<input id="vehicle_number" placeholder="Vehicle Number">
<input id="model" placeholder="Model">
<input id="type" placeholder="Type">

<button onclick="addVehicle()">Add Vehicle</button>
</div>

<!-- SERVICE -->
<div id="service" class="section">
<h2>Add Service</h2>

<select id="vehicleDropdown"></select>
<input id="date" placeholder="Date">
<input id="desc" placeholder="Description">
<input id="cost" placeholder="Cost">

<button onclick="addService()">Add Service</button>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Service History</h2>

<table>
<thead>
<tr><th>ID</th><th>Vehicle</th><th>Date</th><th>Description</th><th>Cost</th></tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
</div>

<script>

// -------- NAVIGATION --------
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// -------- OWNER --------
function addOwner(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Fill all fields");
return;
}

fetch("/add_owner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,address})
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
loadOwners();
loadDashboard();
});
}

// LOAD OWNERS WITH EDIT + SAVE
function loadOwners(){
fetch("/get_owners")
.then(res=>res.json())
.then(data=>{

let rows="",dropdown="";

data.forEach(o=>{
rows+=`
<tr>
<td>${o.owner_id}</td>

<td id="name-${o.owner_id}">${o.name}</td>
<td id="phone-${o.owner_id}">${o.phone}</td>
<td id="address-${o.owner_id}">${o.address}</td>

<td>
<button onclick="enableEdit(${o.owner_id})">Edit</button>
<button onclick="saveEdit(${o.owner_id})">Save</button>
<button onclick="deleteOwner(${o.owner_id})">Delete</button>
</td>
</tr>`;

dropdown+=`<option value="${o.owner_id}">${o.name}</option>`;
});

ownerTable.innerHTML=rows;
ownerDropdown.innerHTML=dropdown;
});
}

// ENABLE EDIT
function enableEdit(id){
["name","phone","address"].forEach(field=>{
let el=document.getElementById(field+"-"+id);
el.contentEditable=true;
el.style.background="#fff3cd";
});
}

// SAVE EDIT
function saveEdit(id){
const name=document.getElementById("name-"+id).innerText.trim();
const phone=document.getElementById("phone-"+id).innerText.trim();
const address=document.getElementById("address-"+id).innerText.trim();

if(!name||!phone||!address){
alert("Fields cannot be empty");
return;
}

fetch("/update_owner/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,address})
})
.then(res=>res.json())
.then(()=>{
alert("Updated Successfully");
loadOwners();
});
}

// DELETE OWNER
function deleteOwner(id){
fetch("/delete_owner/"+id,{method:"DELETE"})
.then(()=>{
loadOwners();
loadDashboard();
});
}

// -------- VEHICLE --------
function addVehicle(){
const owner_id=ownerDropdown.value;
const vehicle_number=document.getElementById("vehicle_number").value;
const model=document.getElementById("model").value;
const type=document.getElementById("type").value;

if(!owner_id||!vehicle_number||!model||!type){
alert("Fill all fields");
return;
}

fetch("/add_vehicle",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({owner_id,vehicle_number,model,type})
})
.then(()=>{alert("Vehicle Added");loadVehicles();loadDashboard();});
}

function loadVehicles(){
fetch("/get_vehicles")
.then(res=>res.json())
.then(data=>{
let dropdown="";
data.forEach(v=>{
dropdown+=`<option value="${v.vehicle_id}">${v.vehicle_number}</option>`;
});
vehicleDropdown.innerHTML=dropdown;
});
}

// -------- SERVICE --------
function addService(){
const vehicle_id=vehicleDropdown.value;
const date=document.getElementById("date").value;
const desc=document.getElementById("desc").value;
const cost=document.getElementById("cost").value;

if(!vehicle_id||!date||!desc||!cost){
alert("Fill all fields");
return;
}

fetch("/add_service",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({vehicle_id,service_date:date,description:desc,cost})
})
.then(()=>{alert("Service Added");loadHistory();loadDashboard();});
}

// -------- HISTORY --------
function loadHistory(){
fetch("/history")
.then(res=>res.json())
.then(data=>{
let rows="";
data.forEach(h=>{
rows+=`<tr>
<td>${h.service_id}</td>
<td>${h.vehicle_number}</td>
<td>${h.service_date}</td>
<td>${h.description}</td>
<td>${h.cost}</td>
</tr>`;
});
historyTable.innerHTML=rows;
});
}

// -------- DASHBOARD --------
let chart;
function loadDashboard(){
fetch("/dashboard")
.then(res=>res.json())
.then(d=>{
ownersCount.innerText=d.owners;
vehiclesCount.innerText=d.vehicles;
servicesCount.innerText=d.services;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Owners","Vehicles","Services"],
datasets:[{data:[d.owners,d.vehicles,d.services]}]
}
});
});
}

// -------- INIT --------
showSection("dashboard");
loadOwners();
loadVehicles();
loadHistory();
loadDashboard();

</script>

</body>
</html>
