<!DOCTYPE html>
<html lang="en">
<head>
    <title>Service Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
    🚗 Service Tracker
    <div>
        <a href="index.html">Dashboard</a>
        <a href="add_owner.html">Owner</a>
        <a href="add_vehicle.html">Vehicle</a>
        <a href="add_service.html">Service</a>
        <a href="view_history.html">History</a>
    </div>
</div>

<div class="container">

    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Total Vehicles</h3>
            <p id="vehicles">0</p>
        </div>

        <div class="card">
            <h3>Total Services</h3>
            <p id="services">0</p>
        </div>

        <div class="card">
            <h3>Total Cost</h3>
            <p id="cost">₹0</p>
        </div>
    </div>

</div>

<script>
fetch("/dashboard")
.then(res => res.json())
.then(data => {
    document.getElementById("vehicles").innerText = data.total_vehicles;
    document.getElementById("services").innerText = data.total_services;
    document.getElementById("cost").innerText = "₹" + data.total_cost;
})
.catch(() => alert("Backend not running!"));
</script>

</body>
</html>
