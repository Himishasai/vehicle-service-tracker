<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="navbar">
🚗 Vehicle Service Tracker
<a href="add_owner.html">Owner</a>
<a href="add_vehicle.html">Vehicle</a>
<a href="add_service.html">Service</a>
<a href="view_history.html">History</a>
</div>

<div class="container">
<h2>Dashboard</h2>

<div class="cards">
<div class="card">Owners: <span id="o"></span></div>
<div class="card">Vehicles: <span id="v"></span></div>
<div class="card">Services: <span id="s"></span></div>
</div>

<canvas id="chart"></canvas>
</div>

<script>
fetch("/dashboard")
.then(r=>r.json())
.then(d=>{
o.innerText=d.owners;
v.innerText=d.vehicles;
s.innerText=d.services;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Owners","Vehicles","Services"],
datasets:[{data:[d.owners,d.vehicles,d.services]}]
}
});
});
</script>

</body>
</html>
