<!DOCTYPE html>
<html>
<head>
    <title>Add Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Add Service</h2>

    <input id="vehicle_id" placeholder="Vehicle ID">
    <input id="service_date" type="date">
    <input id="description" placeholder="Description">
    <input id="cost" placeholder="Cost">
    <input id="mechanic_id" placeholder="Mechanic ID">

    <button onclick="addService()">Submit</button>
</div>

<script>
function addService() {
    fetch("/add_service", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            vehicle_id: vehicle_id.value,
            service_date: service_date.value,
            description: description.value,
            cost: cost.value,
            mechanic_id: mechanic_id.value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
}
</script>

</body>
</html>
