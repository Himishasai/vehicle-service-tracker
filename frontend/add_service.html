<!DOCTYPE html>
<html>
<head>
    <title>Add Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Add Service</h2>

    <input type="number" id="vehicle_id" placeholder="Vehicle ID">
    <input type="date" id="service_date">
    <input type="text" id="description" placeholder="Service Description">
    <input type="text" id="mechanic_name" placeholder="Mechanic Name">

    <button onclick="addService()">Add Service</button>
</div>

<script>
function addService() {
    fetch("/add_service", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            vehicle_id: document.getElementById("vehicle_id").value,
            service_date: document.getElementById("service_date").value,
            description: document.getElementById("description").value,
            mechanic_name: document.getElementById("mechanic_name").value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message))
    .catch(() => alert("Error adding service ❌"));
}
</script>

</body>
</html>
