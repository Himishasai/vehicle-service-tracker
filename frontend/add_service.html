<!DOCTYPE html>
<html>
<head>
    <title>Add Service</title>

    <style>
        body { font-family: Arial; background: #f4f6f9; }
        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Add Service</h2>

    <input id="vehicle_id" placeholder="Vehicle ID"><br>
    <input id="description" placeholder="Service Description"><br>
    <input type="date" id="service_date"><br>
    <input id="mechanic_name" placeholder="Mechanic Name"><br>

    <button onclick="addService()">Add Service</button><br><br>

    <a href="/ui">⬅ Back</a>
</div>

<script>
function addService() {
    fetch("/add_service", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            vehicle_id: document.getElementById("vehicle_id").value,
            description: document.getElementById("description").value,
            service_date: document.getElementById("service_date").value,
            mechanic_name: document.getElementById("mechanic_name").value
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Service Added 🔧");
        document.getElementById("vehicle_id").value = "";
        document.getElementById("description").value = "";
        document.getElementById("service_date").value = "";
        document.getElementById("mechanic_name").value = "";
    })
    .catch(() => alert("Error ❌"));
}
</script>

</body>
</html>
